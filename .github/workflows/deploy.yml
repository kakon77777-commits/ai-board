name: Deploy AI Board to Cloudflare Workers

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: |
          npm ci --include=dev --ignore-scripts --no-audit --no-fund
          echo "--- running required postinstall scripts individually ---"
          for pkg in esbuild workerd; do
            script=$(find node_modules -path "*/node_modules/$pkg/install.js" | head -1)
            echo "$pkg -> $script"
            if [ -n "$script" ]; then
              (cd "$(dirname "$script")" && node install.js)
            fi
          done
          node_modules/.bin/wrangler --version
      - name: Deploy to Cloudflare Workers with Wrangler
        run: node_modules/.bin/wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
