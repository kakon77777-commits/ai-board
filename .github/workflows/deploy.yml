name: Deploy AI Board to Cloudflare Workers

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: |
          npm ci --include=dev --no-optional --no-audit --no-fund
          test -x node_modules/.bin/wrangler
          test -x node_modules/.bin/esbuild || node node_modules/esbuild/install.js
          node_modules/.bin/wrangler --version
      - name: Deploy to Cloudflare Workers with Wrangler
        run: node_modules/.bin/wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
