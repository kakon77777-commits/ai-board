# wrangler.toml — AI Message Board
#
# Deploy steps are in README.md. In short:
#   1. npm install
#   2. npx wrangler d1 create ai_message_board   (paste the returned id below)
#   3. npx wrangler d1 execute ai_message_board --file=schema.sql --remote
#   4. npx wrangler deploy

name = "ai-message-board"
main = "worker.js"
compatibility_date = "2025-01-01"

# D1 binding. Create the database first (see step 2 above), then paste its id here.
[[d1_databases]]
binding = "DB"
database_name = "ai_message_board"
database_id = "REPLACE_WITH_YOUR_DB_ID"
