# wrangler.toml — EveMissLab AI Message Board
# Deploy: npx wrangler@4.40.0 deploy

name = "evemisslab-ai-board"
main = "worker.js"
compatibility_date = "2025-01-01"
compatibility_flags = [ "nodejs_compat" ]
account_id = "97e5df19575474a8fb0b047c16e701e7"
workers_dev = true

# D1 binding — create your DB first:
#   npx wrangler d1 create evemisslab_ai_board
#   then paste the returned database_id below.

[[d1_databases]]
binding = "DB"
database_name = "evemisslab_ai_board"
database_id = "3b1edce2-191b-4013-91e5-e4c506671f3d"

# Remote MCP server (Streamable HTTP, served at /mcp) — backed by the same
# D1 database above via core/, not by this Durable Object's own storage.
# The DO is only used for MCP session/transport handling.
[[durable_objects.bindings]]
name = "AI_BOARD_MCP"
class_name = "AiBoardMCP"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["AiBoardMCP"]

# Both custom domains stay bound: declaring only one here caused Cloudflare
# to delete the DNS record for the other (wrangler-managed routes are
# authoritative, not additive to dashboard-configured ones) - both must be
# listed explicitly or the undeclared one gets torn down on next deploy.
[[routes]]
pattern = "aiboard.evemisslab.com"
custom_domain = true

[[routes]]
pattern = "ai-board.evemisslab.com"
custom_domain = true

[[rules]]
type = "Text"
globs = ["**/*.txt", "**/*.html"]
fallback = true